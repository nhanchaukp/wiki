services:
  wikijs:
    image: linuxserver/wikijs:2.5.300
    container_name: wikijs
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Ho_Chi_Minh
      - DB_TYPE=sqlite #optional
      - DB_HOST= #optional
      - DB_PORT= #optional
      - DB_NAME= #optional
      - DB_USER= #optional
      - DB_PASS= #optional
    volumes:
      # - /path/to/wikijs/config:/config
      - ./data:/data
      - ./server:/server
    ports:
      - 3000:3000
    restart: unless-stopped
